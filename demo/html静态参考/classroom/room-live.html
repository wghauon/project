<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在线课堂 - Python程序设计答疑</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #1a1a1a;
        height: 100vh;
        overflow: hidden;
      }
      /* 顶部栏 */
      .room-header {
        background: #2d2d2d;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border-bottom: 1px solid #3d3d3d;
      }
      .room-info {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .room-title {
        color: white;
        font-size: 16px;
        font-weight: 600;
      }
      .room-status {
        padding: 4px 10px;
        background: #f44336;
        color: white;
        border-radius: 4px;
        font-size: 12px;
      }
      .room-actions {
        display: flex;
        gap: 12px;
      }
      .btn-header {
        padding: 8px 16px;
        background: #3d3d3d;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-leave {
        padding: 8px 20px;
        background: #f44336;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      /* 主内容区 */
      .room-container {
        display: flex;
        height: calc(100vh - 56px);
      }
      /* 视频区 */
      .video-area {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .video-main {
        flex: 1;
        background: #0d0d0d;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .video-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 64px;
      }
      .teacher-info {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.7);
        padding: 12px 20px;
        border-radius: 8px;
      }
      .teacher-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 20px;
      }
      .teacher-name {
        color: white;
        font-weight: 500;
      }
      .teacher-role {
        color: #999;
        font-size: 13px;
      }
      /* 底部工具栏 */
      .toolbar {
        height: 70px;
        background: #2d2d2d;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 0 20px;
      }
      .tool-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 8px 20px;
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 8px;
        transition: background 0.3s;
      }
      .tool-btn:hover {
        background: #3d3d3d;
      }
      .tool-btn.active {
        background: #667eea;
      }
      .tool-icon {
        font-size: 24px;
      }
      .tool-label {
        font-size: 12px;
      }
      /* 侧边栏 */
      .sidebar {
        width: 320px;
        background: #2d2d2d;
        border-left: 1px solid #3d3d3d;
        display: flex;
        flex-direction: column;
      }
      .sidebar-tabs {
        display: flex;
        border-bottom: 1px solid #3d3d3d;
      }
      .sidebar-tab {
        flex: 1;
        padding: 16px;
        background: transparent;
        border: none;
        color: #999;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
      }
      .sidebar-tab.active {
        color: white;
        border-bottom: 2px solid #667eea;
      }
      .sidebar-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }
      /* 成员列表 */
      .member-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .member-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px;
        background: #3d3d3d;
        border-radius: 8px;
      }
      .member-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 14px;
        font-weight: bold;
      }
      .member-name {
        flex: 1;
        color: white;
        font-size: 14px;
      }
      .member-role {
        padding: 2px 8px;
        background: #667eea;
        color: white;
        border-radius: 4px;
        font-size: 11px;
      }
      /* 聊天区 */
      .chat-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 16px;
      }
      .chat-message {
        display: flex;
        gap: 10px;
      }
      .chat-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
        font-weight: bold;
        flex-shrink: 0;
      }
      .chat-content {
        flex: 1;
      }
      .chat-author {
        color: #999;
        font-size: 12px;
        margin-bottom: 4px;
      }
      .chat-text {
        color: white;
        font-size: 14px;
        line-height: 1.5;
        background: #3d3d3d;
        padding: 10px 14px;
        border-radius: 12px;
        border-top-left-radius: 4px;
      }
      .chat-input-area {
        display: flex;
        gap: 10px;
        padding-top: 16px;
        border-top: 1px solid #3d3d3d;
      }
      .chat-input {
        flex: 1;
        padding: 12px 16px;
        background: #3d3d3d;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 14px;
      }
      .chat-input::placeholder {
        color: #666;
      }
      .btn-send {
        padding: 12px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- 顶部栏 -->
    <header class="room-header">
      <div class="room-info">
        <h1 class="room-title">Python程序设计 - 第5章答疑</h1>
        <span class="room-status">🔴 直播中</span>
      </div>
      <div class="room-actions">
        <button class="btn-header">👥 45人</button>
        <button class="btn-header">⏱️ 32分钟</button>
        <button class="btn-leave">离开课堂</button>
      </div>
    </header>

    <!-- 主内容 -->
    <div class="room-container">
      <!-- 视频区 -->
      <div class="video-area">
        <div class="video-main">
          <div class="video-placeholder">🎥</div>
          <div class="teacher-info">
            <div class="teacher-avatar">王</div>
            <div>
              <div class="teacher-name">王教授</div>
              <div class="teacher-role">主讲教师</div>
            </div>
          </div>
        </div>
        <div class="toolbar">
          <button class="tool-btn active">
            <span class="tool-icon">🎤</span>
            <span class="tool-label">麦克风</span>
          </button>
          <button class="tool-btn active">
            <span class="tool-icon">📹</span>
            <span class="tool-label">摄像头</span>
          </button>
          <button class="tool-btn">
            <span class="tool-icon">✋</span>
            <span class="tool-label">举手</span>
          </button>
          <button class="tool-btn">
            <span class="tool-icon">💬</span>
            <span class="tool-label">聊天</span>
          </button>
          <button class="tool-btn">
            <span class="tool-icon">🖥️</span>
            <span class="tool-label">共享屏幕</span>
          </button>
          <button class="tool-btn">
            <span class="tool-icon">⚙️</span>
            <span class="tool-label">设置</span>
          </button>
        </div>
      </div>

      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-tabs">
          <button class="sidebar-tab active">💬 聊天</button>
          <button class="sidebar-tab">👥 成员 (45)</button>
        </div>
        <div class="sidebar-content">
          <!-- 聊天内容 -->
          <div class="chat-list">
            <div class="chat-message">
              <div class="chat-avatar">王</div>
              <div class="chat-content">
                <div class="chat-author">王教授</div>
                <div class="chat-text">
                  同学们好，今天我们来讲解第5章的习题，有什么不懂的地方可以随时提问。
                </div>
              </div>
            </div>
            <div class="chat-message">
              <div class="chat-avatar">李</div>
              <div class="chat-content">
                <div class="chat-author">李四</div>
                <div class="chat-text">老师，第3题的递归算法有点不太理解</div>
              </div>
            </div>
            <div class="chat-message">
              <div class="chat-avatar">王</div>
              <div class="chat-content">
                <div class="chat-author">王教授</div>
                <div class="chat-text">
                  好的，我来看一下这道题，递归的关键是要找到终止条件和递归关系...
                </div>
              </div>
            </div>
            <div class="chat-message">
              <div class="chat-avatar">张</div>
              <div class="chat-content">
                <div class="chat-author">张三</div>
                <div class="chat-text">老师，能再讲一下装饰器的用法吗？</div>
              </div>
            </div>
            <div class="chat-message">
              <div class="chat-avatar">王</div>
              <div class="chat-content">
                <div class="chat-author">王教授</div>
                <div class="chat-text">
                  装饰器是Python中非常强大的特性，它可以在不修改原函数代码的情况下增加功能...
                </div>
              </div>
            </div>
          </div>
          <div class="chat-input-area">
            <input type="text" class="chat-input" placeholder="输入消息..." />
            <button class="btn-send">发送</button>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
